Ask user for a word, string within the word to replace and what to replace with. Based on input, perform the replacements and print on command prompt. The logic doesn’t have to be case-sensitive.
For example,                                   
Enter the word: DATA                                   
Enter string to be replaced: TA                                   
Enter the replacement string: AT                                   
Output: DAAT</textarea>

                            <p>
                                <textarea disabled cols="70" rows="8">
#include<iostream>
#include<string>
#include<algorithm>
using namespace std;

int main()
{
    string s;
    cout << "Enter the word: ";
    getline(cin, s);    
    string x, y;
    cout << "Enter string to be replaced: ";
    getline(cin, x);
    cout << "Enter the replacement string: ";
    getline(cin, y);    
    reverse(s.begin(), s.end());
    reverse(x.begin(), x.end());
    reverse(y.begin(), y.end());
    int ls = s.length(), lx = x.length(), ly = y.length();
    int d = ly - lx;
    int ct = 0;
    int i = 0, j = 0;
    while (i < ls) {
        string temp = "";
        for (int k = 0; k < lx; k++) {
            temp += s[i + k];
        }
        if (temp == x) {
            ct++;
            i = i + lx;
        }
        else {
            i = i + 1;
        }
    }
    for (int i = 0; i < ct * d; i++)
        s += ' ';
    i = ls - 1;
    j = ls + ct * d - 1;
    while (i >= 0 && j >= 0) {
        string temp = "";
        for (int k = 0; k < lx; k++) {
            if (i < (lx - 1 - k))
                break;
            temp += s[i - (lx - 1 - k)];
        }
        if (temp == x) {
            int k = ly - 1;
            while (k >= 0)
                s[j--] = y[k--];
            i = i - lx;
        }
        else {
            s[j--] = s[i--];
        }
    }
    reverse(s.begin(), s.end());
    cout << "The New word is : " + s << endl;
    return 0;
}</textarea>
