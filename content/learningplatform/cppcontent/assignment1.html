#include <stdio.h>
#include <stdlib.h>
#include <string.h>
#define LSIZ 100 
#define RSIZ 10 
int main(void) 
{
    char lineArray[RSIZ][LSIZ];
    FILE *fptr = NULL; 
    int i = 0;
    int total = 0;
    char fname[] = "sample.txt";
    fptr = fopen(fname, "r");
    while(fgets(lineArray[i], LSIZ, fptr)) 
    {
        lineArray[i][strlen(lineArray[i]) - 1] = '\0';
        i++;
    }
    total = i;
    printf("\n The numbers of the file %s  are : \n",fname);    
    for(i = 0; i < total; ++i)
    {
        printf(" %s\n", lineArray[i]);
    }
    printf("\n");
    return 0;
}</textarea>
