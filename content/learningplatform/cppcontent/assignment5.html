Here’s an example                                   
File 1      File 2                  Merged File                                    
Item 1    Delivered         Item 1 Delivered                  
Item 2    Pending           Item 2 Pending                    
Item 3    Not Available   Item 3 Not Available                              
Item 4    Delivered         Item 4 Delivered                         
Item 5                            Item 5                                   
Instructions for all C Assignments                                   
1. No static array to be used. No STLs. No utilities.                                   
2. No magic numbers                                    
3. Use dynamic arrays                                   
String functions can be used</textarea>

                                <textarea disabled cols="70" rows="8">
#include <stdio.h>
#include <stdlib.h>
#include<string.h>    
#define LSIZ 100 

int main()
{
    FILE *fp1 = fopen("file1.txt", "r");
    FILE *fp2 = fopen("file2.txt", "r");   
    FILE *fp3 = fopen("mergeFile.txt", "w");
    char c;
    char d;
    char e;
    char f;   
    if (fp1 == NULL || fp2 == NULL || fp3 == NULL)
    {
        puts("Could not open files");
        exit(0);
    }
    while ((d = fgetc(fp1)) != EOF)
    {
        fputc(d, fp3);
            while ((c = fgetc(fp1)) != '\n')
                fputc(c, fp3);
        fputc(' ', fp3);   
        if((f = fgetc(fp2)) != EOF)
        {
            fputc(f, fp3);
            while ((e = fgetc(fp2)) != '\n')
                fputc(e, fp3);
            fputc('\n', fp3);
        }
    }
    printf("Merged file1.txt and file2.txt into mergeFile.txt");   
    fclose(fp1);
    fclose(fp2);
    fclose(fp3);
    return 0;
}</textarea>
