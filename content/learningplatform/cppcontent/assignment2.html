#include<stdio.h>
int main()
{
    FILE *file = fopen("input.txt", "r");
    int integers[100];
    int i=0;
    int num;
    int temp = 0;
    while(fscanf(file, "%d", &num) > 0) {
    integers[i] = num;
        i++;
    }
    int length = i;
    fclose(file);   
    for (int it = 0; it < length; it++) {     
            for (int j = it+1; j < length; j++) {     
                    if(integers[it] > integers[j]) {    
                            temp = integers[it];    
                            integers[it] = integers[j];    
                            integers[j] = temp;    
                    }     
            }     
        }   
    FILE *fp;
    fp=fopen("output.txt","w+");
    for(int i=0;i<length;i++)
    {
        fprintf(fp,"%d\t",integers[i]);
    }
    fclose(fp); 
    return 0;
}</textarea>
