<html>

<head>
    <title>Basic Registration Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../../styles/style.css">
    <script src="../../../../scripts/script.js"></script>
</head>

<body>
    <br><br>
    <div class="container">
        <a href="regcode.html" class="btn-back" role="button"><i class="bi bi-caret-left-square-fill"></i> Back</a>
        <br><br>
        <form action="">
            <div align="center">
                <label for="username">
                    <font style="color:darkblue"><b> Username : </b></font>
                </label>
                <input type="text" name="username" id="" placeholder="Enter Your Username">
                <br><br>
                <label for="password">
                    <font style="color:aqua"><b>Password : </b></font>
                </label>
                <input type="password" name="password" id="" placeholder="Enter Your Password">
                <br><br>
                <label for="gender">
                    <font style="color:crimson"><b>Select Your Gender :</b></font>
                </label>
                <select name="male" id="">
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>
                <br><br>
                <label for="dob">
                    <font style="color:lightpink"><b>Date of Birth :</b></font>
                </label>
                <input type="date" name="dob" id="">
                <br><br>
                <input type="submit" value="Submit">
            </div>
        </form>
    </div>
</body>

</html>
