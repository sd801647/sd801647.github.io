<!DOCTYPE html>
<html lang="en">

<head>
    <title>Routing Example</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../../styles/style.css">
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular.min.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.6.9/angular-route.js">	</script>
</head>

<body ng-app="myApp">
    <br><br>
    <div class="container">
        <a href="routingcode.html" class="btn-back" role="button"><i class="bi bi-caret-left-square-fill"></i> Back</a>
        <br><br>
        <h1>Routing Example</h1>
        <br>
        <a href="#!/">Home</a>
        <br>
        <a href="#!contact">Contact Us</a>
        <br>
        <a href="#!about">About Us</a>
            <br><br>
        <div ng-view></div>
        <script>
            const app = angular.module("myApp", ["ngRoute"]);
            app.config(function ($routeProvider) {
                $routeProvider
                    .when("/", {
                        template: `<font color=green><b>I am a Home Page</b></font>`
                    })
                    .when("/contact", {
                        template: `<font color=blue><b>I am a Contact Us Page</b></font>`
                    })
                    .when("/about", {
                        template: `<font color=red><b>I am a About Us Page</b></font>`
                    });
            });
        </script>
</body>

</html>
