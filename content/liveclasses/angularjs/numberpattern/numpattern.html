<!DOCTYPE html>
<html lang="en">

<head>
    <title>Number Pattern</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../../styles/style.css">
</head>

<body>
    <br><br>
    <div class="container">
        <a href="numpatterncode.html" class="btn-back" role="button"><i class="bi bi-caret-left-square-fill"></i> Back</a>
        <br><br>
        <h1>Number Pattern</h1>
        <p>Enter the Number of Rows: </p>
        <input type="text" id="num" name="num" ng-model="num" onkeyup="numPattern()">

        <script>
            function numPattern() {
                var num = document.getElementById('num').value;
                var n = parseInt(num);
                let pattern = "";
                for (let i = 1; i <= n; i++) {
                    for (let j = 0; j < i; j++) {
                        pattern += i.toString();
                    }
                    pattern += "<br>";
                }
                document.getElementById("pattern").innerHTML = pattern.toString();   
            }
        </script>
        <div ng-app = "">
            <p><b>The answer is:
                <br>
                <span id="pattern" ng-bind="pattern"></span>
            </b></p>
        </div>
        <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.14/angular.min.js"></script>
    </div>
</body>

</html>
