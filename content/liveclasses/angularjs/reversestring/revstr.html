<!DOCTYPE html>
<html lang="en">

<head>
    <title>Reverse String</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../../styles/style.css">
</head>

<body>
    <br><br>
    <div class="container">
        <a href="revstrcode.html" class="btn-back" role="button"><i class="bi bi-caret-left-square-fill"></i> Back</a>
        <br><br>
        <h1>Reverse String</h1>
        <p>Enter the String : </p>
        <input type="text" id="str" name="str" ng-model="str" onkeyup="revStr()">

        <script>
            function revStr() {
                var str = document.getElementById('str').value;
                var lenStr = str.length;
                ans = "";
                for(let i = lenStr - 1; i >= 0; i--) {
                    ans += str[i];
                }
                document.getElementById("revstr").innerHTML = ans;   
            }
        </script>
        <div ng-app = "">
            <p><b>The answer is:
                <br>
                <span id="revstr" ng-bind="str"></span>
            </b></p>
        </div>
        <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.14/angular.min.js"></script>
    </div>
</body>

</html>
