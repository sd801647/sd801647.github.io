<!DOCTYPE html>
<html lang="en">

<head>
    <title>Digit Sum</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../../styles/style.css">
</head>

<body>
    <br><br>
    <div class="container">
        <a href="sumdigitscode.html" class="btn-back" role="button"><i class="bi bi-caret-left-square-fill"></i> Back</a>
        <br><br>
        <h1>Digit Sum</h1>
        <p>Enter the Number : </p>
        <input type="text" id="num" name="num" ng-model="num" onkeyup="sumDigits()">

        <script>
            function sumDigits() {
                var num = document.getElementById('num').value;
                var len = num.length;
                sum = 0;
                for(let i = 0; i < len; i++) {
                    sum += parseInt(num[i]);
                }
                document.getElementById("sumdigit").innerHTML = sum.toString();   
            }
        </script>
        <div ng-app = "">
            <p><b>The answer is:
                <br>
                <span id="sumdigit" ng-bind="sumdigit"></span>
            </b></p>
        </div>
        <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.14/angular.min.js"></script>
    </div>
</body>

</html>
