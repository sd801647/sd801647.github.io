<!DOCTYPE html>
<html lang="en">

<head>
    <title>Word Count</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../../styles/style.css">
</head>

<body>
    <br><br>
    <div class="container">
        <a href="wordcountcode.html" class="btn-back" role="button"><i class="bi bi-caret-left-square-fill"></i> Back</a>
        <br><br>
        <h1>Word Count</h1>
        <p>Enter the Sentence : </p>
        <input type="text" id="sen" name="sen" ng-model="sen" onkeyup="countWord()">

        <script>
            function countWord() {
                var sen = document.getElementById('sen').value;
                var lenStr = sen.length;
                let count = 0;
                for(let i = 0; i < lenStr; i++) {
                    if(sen[i] == ' ' ) {
                        count ++;
                    }
                }
                let wcount = count + 1;
                document.getElementById("wcount").innerHTML = wcount.toString();   
            }
        </script>
        <div ng-app = "">
            <p><b>The answer is:
                <br>
                <span id="wcount" ng-bind="wcount"></span>
            </b></p>
        </div>
        <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.14/angular.min.js"></script>
    </div>
</body>

</html>
