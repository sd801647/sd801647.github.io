<!DOCTYPE html>
<html lang="en">

<head>
    <title>Even Word Count</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../../styles/style.css">
</head>

<body>
    <br><br>
    <div class="container">
        <a href="evenwordcountcode.html" class="btn-back" role="button"><i class="bi bi-caret-left-square-fill"></i> Back</a>
        <br><br>
        <h1>Even Word Count</h1>
        <p>Enter the Sentence : </p>
        <input type="text" id="sen" name="sen" ng-model="sen" onkeyup="evenCountWord()">

        <script>
            function evenCountWord() {
                var sen = document.getElementById('sen').value;
                const myArray = sen.split(" ");
                count = 0;
                for(let i = 0; i < myArray.length; i++) {
                    if((myArray[i].length)%2 == 0 ) {
                        count ++;
                    }
                }
                document.getElementById("ewcount").innerHTML = count.toString();   
            }
        </script>
        <div ng-app = "">
            <p><b>The answer is:
                <br>
                <span id="ewcount" ng-bind="ewcount"></span>
            </b></p>
        </div>
        <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.3.14/angular.min.js"></script>
    </div>
</body>

</html>
