<html>

<head>
    <title>Add Two Number</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../../styles/style.css">
    <script>
        function Add() {
            var anum = document.getElementById('a').value;
            var a = parseInt(anum);
            var bnum = document.getElementById('b').value;
            var b = parseInt(bnum);
            var answer = a + b;
            document.getElementById("add").innerHTML = answer.toString();
        }
    </script>
</head>

<body>
    <div class="container">
        <br>
        <a href="addtwonumcode.html" class="btn-back" role="button"><i class="bi bi-caret-left-square-fill"></i>
            Back</a>
        <br><br><br>
        <h1>Add Two Number</h1>
        <p>Enter 1st Number: </p>
        <input type="text" id="a" name="a">
        <br><br>
        <p>Enter 2nd Number: </p>
        <input type="text" id="b" name="b">
        <button type="button" onclick="Add()">Calculate</button>
        <br><br>
        <p><b>The answer is:
            <span id="add"></span>
        </b></p>
    </div>
</body>

</html>
