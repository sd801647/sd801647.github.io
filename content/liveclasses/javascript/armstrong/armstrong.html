<html>
<head>
    <title>Check Armstrong</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../../styles/style.css">
    <script>
        function checkArmstrong() {
            var num = document.getElementById('num').value;
            var n = parseInt(num);
            const numberOfDigits = num.length;
            let sum = 0;
            let temp = n;

            while (temp > 0) {
                let remainder = temp % 10;
                sum += remainder ** numberOfDigits;
                temp = parseInt(temp / 10);
            }

            if (sum == n) {
                document.getElementById("armstrong").innerHTML = "Armstrong number";
            }
            else {
                document.getElementById("armstrong").innerHTML = " Not an Armstrong number.";
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <br>
        <a href="armstrongcode.html" class="btn-back" role="button"><i class="bi bi-caret-left-square-fill"></i>
            Back</a>
        <br><br><br>
        <h1>Check Armstrong</h1>
        <p>Enter the Number: </p>
        <input type="text" id="num" name="num">
        <button type="button" onclick="checkArmstrong()">Check</button>
        <br><br>
        <p><b>The answer is:
            <span id="armstrong"></span>
        </b></p>
    </div>
</body>
</html>
