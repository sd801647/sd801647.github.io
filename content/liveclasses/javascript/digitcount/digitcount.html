<html>

<head>
    <title>Digit Count</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../../styles/style.css">
    <script>
        function digit_count() {
            var num = document.getElementById('num').value;
            var n = parseInt(num);
            var count = 0;
            if (n >= 1) 
                ++count;
            while (n / 10 >= 1) {
                n /= 10;
                ++count;
            }
            document.getElementById("digit_count").innerHTML = count.toString();
        }
    </script>
</head>

<body>
    <div class="container">
        <br>
        <a href="digitcountcode.html" class="btn-back" role="button"><i class="bi bi-caret-left-square-fill"></i>
            Back</a>
        <br><br><br>
        <h1>Digit Count</h1>
        <p>Enter the Number: </p>
        <input type="text" id="num" name="num">
        <button type="button" onclick="digit_count()">Calculate</button>
        <br><br>
        <p><b>The answer is:
                <span id="digit_count"></span>
        </b></p>
    </div>
</body>

</html>
