<html>

<head>
    <title>Check Palindrome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../../styles/style.css">
    <script>
        function checkPalindrome() {
            var string = document.getElementById('string').value;
            const len = string.length;
            var isPalindrome = true;
            for (let i = 0; i < len / 2; i++) {
                if (string[i] !== string[len - 1 - i]) {
                    isPalindrome = false;
                    break;
                }
            }
            if (isPalindrome) {
                alert('It is a palindrome');
            }
            else {
                alert('It is not a palindrome');
            }
        }
    </script>
</head>

<body>
    <div class="container">
        <br>
        <a href="palindromecode.html" class="btn-back" role="button"><i class="bi bi-caret-left-square-fill"></i>
            Back</a>
        <br><br><br>
        <h1>Check Palindrome</h1>
        <p>Enter the string: </p>
        <input type="text" id="string" name="string">
        <button type="button" onclick="checkPalindrome()">Check</button>
    </div>
</body>

</html>
