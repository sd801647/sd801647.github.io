<html>
<head>
    <title>Factorial</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../../styles/style.css">
    <script>
        function Factorial() {
            var num = document.getElementById('num').value;
            var n = parseInt(num);
            var answer = 1;
            if (n == 0 || n == 1) {
                document.getElementById("fact").innerHTML = answer.toString();
            } else {
                for (var i = n; i >= 1; i--) {
                    answer = answer * i;
                }
                document.getElementById("fact").innerHTML = answer.toString();
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <br>
        <a href="factorialcode.html" class="btn-back" role="button"><i class="bi bi-caret-left-square-fill"></i>
            Back</a>
        <br><br><br>
        <h1>Factorial Calculation</h1>
        <p>Enter the Number: </p>
        <input type="text" id="num" name="num">
        <button type="button" onclick="Factorial()">Calculate</button>
        <br><br>
        <p><b>The answer is:
                <span id="fact"></span>
        </b></p>
    </div>
</body>
</html>
