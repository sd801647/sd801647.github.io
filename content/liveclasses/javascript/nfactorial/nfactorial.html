<html>
<head>
    <title>Factorial 1 to N</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.9.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="../../../../styles/style.css">
    <script>
        function nFactorial() {
            var num = document.getElementById('num').value;
            var n = parseInt(num);
            allFact = "";
            for (var j = 1; j <= n; j++) {
                var answer = 1;
                if (j == 0 || j == 1) {
                    allFact += ' ' + answer.toString();
                } else {
                    for (var i = j; i >= 1; i--) {
                        answer = answer * i;
                    }
                    allFact += ' ' + answer.toString();
                }
                document.getElementById("nfact").innerHTML = allFact;
            }
        }
    </script>
</head>
<body>
    <div class="container">
        <br>
        <a href="nfactorialcode.html" class="btn-back" role="button"><i class="bi bi-caret-left-square-fill"></i>
            Back</a>
        <br><br><br>
        <h1>Factorial Calculation from 1 to N</h1>
        <p>Enter the Number: </p>
        <input type="text" id="num" name="num">
        <button type="button" onclick="nFactorial()">Calculate</button>
        <br><br>
        <p><b>The answer is:
                <span id="nfact"></span>
        </b></p>
    </div>
</body>
</html>
